        <h2>Mis Lecturas</h2>
        <h3>(Pendiente de completar)</h3>
        
        <!-- Tabs Container -->
        <div class="tabs-header-row">
            <div class="tabs-container">
                <div class="tab-button active" data-status="en_marcha">
                    En marcha
                    <span class="tab-help" aria-label="Libros que estoy leyendo actualmente" title="Libros que estoy leyendo actualmente">?</span>

                <span class="tab-help" aria-label="Libros que pienso leer próximamente" title="Libros que pienso leer próximamente">?</span>

            <div class="tab-button" data-status="terminadas">

                <span class="tab-help" aria-label="Libros que ya he leído" title="Libros que ya he leído">?</span>

                <span class="tab-help" aria-label="Libros abandonados o pausados" title="Libros abandonados o pausados">?</span>
            </div>
        </div>
        <button id="collapse-all-btn" class="btn-collapse-all">Colapsar todas</button>
        </div>
